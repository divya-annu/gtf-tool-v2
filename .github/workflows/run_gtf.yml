name: Run GTF Options Engine

on:
  workflow_dispatch: # Manual trigger ke liye
  schedule:
    - cron: '30 10 * * 1-5' # Monday to Friday har din chalega (IST ke hisab se)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy requests

    - name: Run GTF Analytics Engine
      run: python gtf_engine.py

    # 🌟 YEH SECTION FILE KO REPO MEIN APNE AAP SAVE KAREGA
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Automated GTF Option Chain Update [Skip CI]" || echo "No changes to commit"
        git push origin main
