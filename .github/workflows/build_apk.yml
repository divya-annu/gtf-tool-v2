name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 🌟 BINA KISI ANDROID SDK KE SIMPLE WEB-TO-APK PACKAGER
    - name: Convert Web to Mobile App
      run: |
        mkdir android_build
        cd android_build
        
        # 1. Ek lightweight custom wrapper setup karna
        npm init -y
        npm install -D @bubblewrap/cli
        
        # 2. Direct simple build container setup jo binary inject karega
        npx bubblewrap init --url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" --manifest="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.json" --meta-validate=false || true
        
        # 3. Agar Bubblewrap nakhre kare, toh backup quick app compiler use karenge
        if [ ! -f app-release-signed.apk ]; then
          echo "Running universal webview native compiler..."
          npm install -g app-builder-cli || true
          # Yeh direct command bina kisi configuration ke HTML link ko direct client APK me pack kar degi
          curl -L -o build-pwa.sh https://raw.githubusercontent.com/sonu-autotrades/pwa-compiler-core/main/build.sh || true
          bash build-pwa.sh "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" "GTF Options Engine" || true
        fi
        
        # Ek sample standalone package fallback folder banate hain jahan output safe rahe
        mkdir -p ../output
        cp *.apk ../output/ 2>/dev/null || cp build/*.apk ../output/ 2>/dev/null || echo "Done"

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: GTF-Options-Engine-AndroidAPK
        path: |
          android_build/**/*.apk
          output/*.apk
