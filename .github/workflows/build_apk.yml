name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'zulu'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova and Build APK
      run: |
        # 1. Cordova CLI install karo
        npm install -g cordova

        # 2. Ek naya clean app project create karo
        cordova create gtfapp com.gtf.optionsengine "GTF Options Engine"
        cd gtfapp

        # 3. Android platform add karo
        cordova platform add android --no-telemetry

        # 4. Injected Script: Jo open hote hi aapki live website par redirect karega smoothly
        cat << 'EOF' > www/js/index.js
        document.addEventListener('deviceready', onDeviceReady, false);
        function onDeviceReady() {
            window.location.href = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/";
        }
        EOF

        # 5. Config file me internet aur full-screen features update karna
        sed -i 's|<content src="index.html" />|<content src="index.html" /><allow-navigation href="*" /><preference name="HardwareAcceleration" value="true" />|' config.xml

        # 6. Build Android APK
        cordova build android --device

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: GTF-Options-Engine-AndroidAPK
        path: gtfapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
