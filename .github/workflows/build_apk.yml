name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🌟 Docker container ka use karke ek dum safe aur standard tarike se APK banana
    - name: Build APK via Webview CLI
      run: |
        mkdir out
        docker run --v $PWD/out:/app/out webassembly/webview-cli \
          --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
          --title "GTF Options Engine" \
          --package "com.gtf.optionsengine" \
          --output /app/out/GTF_Options_Engine.apk || true
          
        # Agar upar wala image busy ho, toh backup standard builder use karenge
        if [ ! -f out/GTF_Options_Engine.apk ]; then
          echo "Using secondary build system..."
          docker run --rm -v $PWD/out:/dist ghcr.io/adiwijd/pwa-to-apk:latest \
            --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            --name "GTF Options Engine" \
            --package "com.gtf.optionsengine"
        fi

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: GTF-Options-Engine-AndroidAPK
        path: out/*.apk
